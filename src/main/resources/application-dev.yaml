spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/todolist}
    username: ${DB_USERNAME:todolist}
    password: ${DB_PASSWORD:todolist}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: INFO
    com.mipt.todolist: DEBUG
    org.springframework.web: INFO
