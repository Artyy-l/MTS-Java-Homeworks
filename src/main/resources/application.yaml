server:
  port: 8080

spring:
  profiles:
    default: dev
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  flyway:
    enabled: true

app:
  name: To-Do List Manager
  version: 1.0.0
  api:
    version: "2.0.0"
  uploads:
    directory: uploads
  cors:
    allowed-origin: "http://localhost:3000"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
